<!-- src/app/features/admin/user-form/user-form.component.html -->
<div class="user-form-container">
  <div class="form-header">
    <h2>{{ isEditMode ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur' }}</h2>
    <button class="btn-secondary" routerLink="/admin/users">Retour</button>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="user-form">
    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" formControlName="nom" class="form-control">
      <div class="error" *ngIf="userForm.get('nom')?.invalid && userForm.get('nom')?.touched">
        Le nom est requis
      </div>
    </div>

    <div class="form-group">
      <label>Username *</label>
      <input type="text" formControlName="username" class="form-control">
      <div class="error" *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched">
        Le username est requis
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" formControlName="email" class="form-control">
      <div class="error" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
        Email valide requis
      </div>
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="tel" formControlName="telephone" class="form-control">
    </div>

    <div class="form-group">
      <label>Rôle *</label>
      <select formControlName="role" class="form-control">
        <option value="USER">Utilisateur</option>
        <option value="TECHNICIEN">Technicien</option>
        <option value="ADMIN">Administrateur</option>
      </select>
    </div>

    <div class="form-group" *ngIf="!isEditMode">
      <label>Mot de passe *</label>
      <input type="password" formControlName="password" class="form-control">
      <div class="password-strength" *ngIf="userForm.get('password')?.value">
        <div class="strength-bar" [class]="getPasswordStrength()"></div>
        <span class="strength-label">Force: {{ getPasswordStrengthLabel() }}</span>
      </div>
      <div class="error" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
        Mot de passe requis (min 6 caractères)
      </div>
    </div>

    <div class="form-group" *ngIf="isEditMode">
      <label>Nouveau mot de passe (optionnel)</label>
      <input type="password" formControlName="password" class="form-control">
      <div class="password-strength" *ngIf="userForm.get('password')?.value">
        <div class="strength-bar" [class]="getPasswordStrength()"></div>
        <span class="strength-label">Force: {{ getPasswordStrengthLabel() }}</span>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" routerLink="/admin/users">Annuler</button>
      <button type="submit" class="btn-primary" [disabled]="loading || userForm.invalid">
        {{ loading ? 'Enregistrement...' : (isEditMode ? 'Mettre à jour' : 'Créer') }}
      </button>
    </div>
  </form>
</div>
